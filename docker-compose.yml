services:
  mongo:
    image: mongo:7
    container_name: pw-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    volumes:
      - mongo_data:/data/db
    ports:
      - "${MONGO_PORT}:27017"

  backend:
    build: ./backend
    container_name: pw-backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "${BACKEND_PORT}:5000"
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: pw-frontend
    restart: unless-stopped
    env_file: .env
    environment:
      - VITE_API_URL=${VITE_API_URL}
    ports:
      - "${FRONTEND_PORT}:5173"
    depends_on:
      - backend

volumes:
  mongo_data:
